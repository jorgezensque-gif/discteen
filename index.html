<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>DISC Teen - Teste de Personalidade</title>
    <style>
        /* Estilo Dark inspirado na sua imagem */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #quiz-container {
            width: 90%;
            max-width: 450px;
            background: #1e1e1e;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .badge {
            border: 1px solid #00FFAB;
            color: #00FFAB;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            display: inline-block;
            text-transform: uppercase;
        }

        .logo-img { max-width: 80%; margin-bottom: 15px; }

        h1, h2 { font-size: 1.4rem; margin-bottom: 20px; color: #00FFAB; }

        .question { font-size: 1.1rem; margin-bottom: 25px; line-height: 1.4; color: #eee; }

        /* Cores das respostas baseadas no DISC */
        .option-btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: transform 0.2s, opacity 0.2s;
            color: #ffffff;
        }

        /* Classes específicas para as cores */
        .btn-d { background-color: #FF4B5C; } /* Rosa/Vermelho */
        .btn-i { background-color: #FFD166; color: #121212; } /* Amarelo */
        .btn-s { background-color: #06D6A0; } /* Verde */
        .btn-c { background-color: #118AB2; } /* Azul */

        .option-btn:active { transform: scale(0.96); opacity: 0.9; }

        #result { font-weight: bold; margin-top: 20px; }
        .result-profile { font-size: 1.8rem; color: #00FFAB; margin: 15px 0; }
        
        .progress-bar {
            background: #333;
            height: 6px;
            border-radius: 3px;
            margin-bottom: 25px;
            overflow: hidden;
        }
        #progress {
            background: #00FFAB;
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        .footer-text { color: #888; font-size: 0.9rem; margin-top: 15px; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="home-screen">
        <div class="badge">✦ Teste de Personalidade</div>
        <img src="logo.png" alt="DISC Teen" class="logo-img">
        <p class="question">Descubra seu perfil de personalidade em 15 perguntas.<br><strong>Feito especialmente pra você.</strong></p>
        <button class="option-btn btn-s" style="background-color: #00FFAB; color: #121212;" onclick="startQuiz()">COMEÇAR AGORA</button>
    </div>

    <div id="quiz-content" style="display: none;">
        <div class="progress-bar"><div id="progress"></div></div>
        <div id="question-text" class="question"></div>
        <div id="options"></div>
    </div>

    <div id="result" style="display: none;">
        <div class="badge">Resultado</div>
        <h2>Seu perfil dominante é:</h2>
        <div id="profile-name" class="result-profile"></div>
        <p id="profile-desc" style="color: #ccc; line-height: 1.5;"></p>
        <button class="option-btn btn-c" onclick="location.reload()">Refazer Teste</button>
    </div>
    
    <div class="footer-text">Projeto DISC Teen</div>
</div>

<script>
// Mantendo EXATAMENTE sua lógica original do arquivo enviado
const questions = [
    { q: "Em uma festa com amigos, você prefere:", options: [{ t: "Contar histórias e ser o centro das atenções", p: "I" }, { t: "Ouvir os outros e garantir que todos estejam bem", p: "S" }, { t: "Organizar a música ou a comida para que tudo saia perfeito", p: "C" }, { t: "Decidir qual será a próxima brincadeira ou lugar para ir", p: "D" }] },
    { q: "Quando recebe um desafio difícil, sua reação é:", options: [{ t: "Ficar animado e tentar resolver logo", p: "D" }, { t: "Pensar em todos os detalhes antes de começar", p: "C" }, { t: "Pedir ajuda para os amigos", p: "I" }, { t: "Manter a calma e ir no seu ritmo", p: "S" }] },
    { q: "Seus amigos dizem que você é mais:", options: [{ t: "Determinado e direto", p: "D" }, { t: "Engraçado e comunicativo", p: "I" }, { t: "Paciente e bom ouvinte", p: "S" }, { t: "Organizado e perfeccionista", p: "C" }] },
    { q: "Ao planejar um passeio, você:", options: [{ t: "Faz uma lista detalhada de tudo o que precisa", p: "C" }, { t: "Deixa que os outros decidam", p: "S" }, { t: "Convence todo mundo a ir onde você quer", p: "I" }, { t: "Toma a liderança e define o horário", p: "D" }] },
    { q: "Na escola, você prefere matérias que:", options: [{ t: "Envolvam cálculos e lógica", p: "C" }, { t: "Permitam debates e conversas", p: "I" }, { t: "Tenham resultados rápidos e objetivos", p: "D" }, { t: "Sejam tranquilas e em grupo", p: "S" }] },
    { q: "Quando alguém discorda de você, você:", options: [{ t: "Defende seu ponto de vista com energia", p: "D" }, { t: "Tenta entender o lado do outro para não brigar", p: "S" }, { t: "Brinca com a situação para aliviar o clima", p: "I" }, { t: "Apresenta fatos e provas para mostrar que está certo", p: "C" }] },
    { q: "Seu quarto geralmente está:", options: [{ t: "Super organizado, cada coisa no seu lugar", p: "C" }, { t: "Um pouco bagunçado, mas cheio de lembranças", p: "I" }, { t: "Confortável e do seu jeito", p: "S" }, { t: "Prático, com o que você precisa à mão", p: "D" }] },
    { q: "Em um jogo de equipe, você é quem:", options: [{ t: "Dá as ordens para vencer", p: "D" }, { t: "Anima o time quando estão perdendo", p: "I" }, { t: "Joga com calma e ajuda os colegas", p: "S" }, { t: "Segue as regras e estratégias à risca", p: "C" }] },
    { q: "Ao conhecer alguém novo, você:", options: [{ t: "Já sai conversando como se fossem velhos amigos", p: "I" }, { t: "É educado, mas prefere observar primeiro", p: "S" }, { t: "É direto e pergunta logo o que quer saber", p: "D" }, { t: "Analisa a pessoa antes de falar muito", p: "C" }] },
    { q: "Se ganhasse um prêmio, seria por:", options: [{ t: "Ser o melhor líder", p: "D" }, { t: "Ser o aluno mais popular", p: "I" }, { t: "Ser o amigo mais leal", p: "S" }, { t: "Ser o mais inteligente e caprichoso", p: "C" }] },
    { q: "Para você, o mais importante é:", options: [{ t: "Ganhar e alcançar metas", p: "D" }, { t: "Ser aceito e querido por todos", p: "I" }, { t: "Ter paz e tranquilidade", p: "S" }, { t: "Fazer tudo de forma correta e justa", p: "C" }] },
    { q: "Se você fosse um animal, seria:", options: [{ t: "Leão (Forte e líder)", p: "D" }, { t: "Arara (Colorida e barulhenta)", p: "I" }, { t: "Golfinho (Amigável e calmo)", p: "S" }, { t: "Coruja (Observadora e sábia)", p: "C" }] },
    { q: "Sua maior qualidade é:", options: [{ t: "Coragem", p: "D" }, { t: "Criatividade", p: "I" }, { t: "Lealdade", p: "S" }, { t: "Precisão", p: "C" }] },
    { q: "Quando está sob pressão, você fica:", options: [{ t: "Impaciente e quer resolver logo", p: "D" }, { t: "Agitado e fala demais", p: "I" }, { t: "Calado e tenta não se envolver", p: "S" }, { t: "Preocupado com os detalhes", p: "C" }] },
    { q: "Você se sente mais feliz quando:", options: [{ t: "Termina uma tarefa difícil", p: "D" }, { t: "Está rodeado de gente divertida", p: "I" }, { t: "Pode relaxar sem pressa", p: "S" }, { t: "Tudo sai exatamente como planejou", p: "C" }] }
];

let currentQuestion = 0;
let scores = { D: 0, I: 0, S: 0, C: 0 };

function startQuiz() {
    document.getElementById('home-screen').style.display = 'none';
    document.getElementById('quiz-content').style.display = 'block';
    showQuestion();
}

function showQuestion() {
    const q = questions[currentQuestion];
    document.getElementById('question-text').innerText = q.q;
    const optionsDiv = document.getElementById('options');
    optionsDiv.innerHTML = '';
    
    // Mapeamento de cores fixas por perfil para os botões
    const colorClasses = { D: 'btn-d', I: 'btn-i', S: 'btn-s', C: 'btn-c' };

    q.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.innerText = opt.t;
        btn.className = `option-btn ${colorClasses[opt.p]}`;
        btn.onclick = () => selectOption(opt.p);
        optionsDiv.appendChild(btn);
    });

    document.getElementById('progress').style.width = ((currentQuestion / questions.length) * 100) + '%';
}

function selectOption(perfil) {
    scores[perfil]++;
    currentQuestion++;
    if (currentQuestion < questions.length) {
        showQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.getElementById('quiz-content').style.display = 'none';
    const resultDiv = document.getElementById('result');
    resultDiv.style.display = 'block';

    const winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
    
    const profiles = {
        D: { name: "Dominância", desc: "Você é focado em resultados, direto e adora um desafio. Tem perfil de liderança nata!" },
        I: { name: "Influência", desc: "Você é comunicativo, entusiasmado e adora estar com pessoas. Sua energia contagia o ambiente!" },
        S: { name: "Estabilidade", desc: "Você é paciente, leal e ótimo ouvinte. Valoriza a harmonia e ajuda a todos ao seu redor." },
        C: { name: "Conformidade", desc: "Você é detalhista, organizado e lógico. Gosta de seguir regras e preza pela qualidade em tudo." }
    };

    document.getElementById('profile-name').innerText = profiles[winner].name;
    document.getElementById('profile-desc').innerText = profiles[winner].desc;
}

// Registro do Service Worker para PWA
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
